<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidya AI Tutor — Smart Doubt Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0E1A;
  --bg2: #111827;
  --bg3: #1A2236;
  --bg4: #222F45;
  --purple: #7C3AED;
  --purple2: #9D5CF0;
  --blue: #3B82F6;
  --cyan: #06B6D4;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --pink: #EC4899;
  --text: #F1F5F9;
  --text2: #94A3B8;
  --border: rgba(124,58,237,0.2);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px;
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
}
.header {
  width:100%; max-width:480px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 10px;
  animation: fadeDown .5s ease both;
}
.logo {
  width:46px; height:46px; flex-shrink:0;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  border-radius: 12px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
}
.header-info h1 {
  font-family:'Baloo 2',cursive;
  font-size:17px; font-weight:700;
  background: linear-gradient(135deg,var(--purple2),var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header-info p { font-size:11px; color:var(--text2); margin-top:1px; }
.online-badge {
  margin-left:auto;
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--green);
  background: rgba(16,185,129,0.1);
  padding:4px 10px; border-radius:20px;
  border:1px solid rgba(16,185,129,0.2);
}
.online-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
.tabs {
  width:100%; max-width:480px;
  display:flex; gap:6px; margin-bottom:10px;
  animation: fadeDown .55s ease both;
}
.tab {
  flex:1; padding:9px; text-align:center;
  font-size:12.5px; font-weight:500;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--bg2); color:var(--text2);
  cursor:pointer; transition:all .2s;
}
.tab.active {
  background:rgba(124,58,237,0.15);
  border-color:var(--purple);
  color:#C4B5FD;
}
.subjects {
  width:100%; max-width:480px;
  display:flex; flex-wrap:wrap; gap:6px;
  margin-bottom:10px;
  animation: fadeDown .6s ease both;
}
.subj {
  padding:6px 12px; border-radius:20px;
  font-size:12px; font-weight:500;
  border:1px solid; cursor:pointer;
  transition:all .18s; background:transparent;
  font-family:'Poppins',sans-serif;
}
.subj:hover { transform:translateY(-1px); }
.subj.math   { border-color:rgba(245,158,11,0.4); color:#FCD34D; }
.subj.sci    { border-color:rgba(16,185,129,0.4); color:#6EE7B7; }
.subj.eng    { border-color:rgba(59,130,246,0.4); color:#93C5FD; }
.subj.hindi  { border-color:rgba(236,72,153,0.4); color:#F9A8D4; }
.subj.hist   { border-color:rgba(239,68,68,0.4);  color:#FCA5A5; }
.subj.geo    { border-color:rgba(6,182,212,0.4);  color:#67E8F9; }
.subj.chem   { border-color:rgba(124,58,237,0.4); color:#C4B5FD; }
.subj.bio    { border-color:rgba(16,185,129,0.4); color:#86EFAC; }
.subj.phy    { border-color:rgba(245,158,11,0.5); color:#FDE68A; }
.subj.comp   { border-color:rgba(59,130,246,0.5); color:#BAE6FD; }
.subj.active { transform:translateY(-1px); }
.subj.math.active  { background:rgba(245,158,11,0.12); }
.subj.sci.active   { background:rgba(16,185,129,0.12); }
.subj.eng.active   { background:rgba(59,130,246,0.12); }
.subj.hindi.active { background:rgba(236,72,153,0.12); }
.subj.hist.active  { background:rgba(239,68,68,0.12);  }
.subj.geo.active   { background:rgba(6,182,212,0.12);  }
.subj.chem.active  { background:rgba(124,58,237,0.12); }
.subj.bio.active   { background:rgba(16,185,129,0.12); }
.subj.phy.active   { background:rgba(245,158,11,0.15); }
.subj.comp.active  { background:rgba(59,130,246,0.15); }
.class-row {
  width:100%; max-width:480px;
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px;
  animation: fadeDown .65s ease both;
}
.class-label { font-size:12px; color:var(--text2); flex-shrink:0; }
.class-pills { display:flex; gap:5px; flex-wrap:wrap; }
.cls {
  padding:4px 10px; border-radius:12px;
  font-size:11.5px; font-weight:500;
  border:1px solid var(--border);
  background:transparent; color:var(--text2);
  cursor:pointer; transition:all .15s;
  font-family:'Poppins',sans-serif;
}
.cls.active {
  background:rgba(124,58,237,0.2);
  border-color:var(--purple);
  color:#C4B5FD;
}
.panel { width:100%; max-width:480px; }
.chat-box {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex; flex-direction:column;
  height:460px;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
  animation:fadeUp .55s ease both;
}
.messages {
  flex:1; overflow-y:auto;
  padding:16px 13px;
  display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar { width:3px; }
.messages::-webkit-scrollbar-thumb { background:rgba(124,58,237,0.3); border-radius:2px; }
.msg { display:flex; gap:9px; animation:popIn .3s ease both; }
.msg.user { flex-direction:row-reverse; }
.av {
  width:30px; height:30px; flex-shrink:0; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; margin-top:2px;
}
.msg.bot .av  { background:linear-gradient(135deg,var(--purple),var(--blue)); }
.msg.user .av { background:var(--bg3); border:1px solid var(--border); }
.bubble {
  max-width:80%; padding:11px 14px;
  font-size:13.5px; line-height:1.6; border-radius:14px;
}
.msg.bot  .bubble { background:var(--bg3); border:1px solid var(--border); border-bottom-left-radius:3px; }
.msg.user .bubble { background:linear-gradient(135deg,var(--purple),var(--purple2)); border-bottom-right-radius:3px; color:#fff; }
.bubble .math-block {
  background:var(--bg4); border-radius:8px;
  padding:10px 12px; margin:8px 0;
  font-family:monospace; font-size:13px;
  border-left:3px solid var(--purple);
  white-space:pre-wrap;
}
.typing { display:flex; gap:9px; align-items:center; animation:popIn .3s ease both; }
.typing .av { background:linear-gradient(135deg,var(--purple),var(--blue)); }
.dots { display:flex; gap:4px; padding:13px 15px; background:var(--bg3); border-radius:14px; border-bottom-left-radius:3px; border:1px solid var(--border); }
.dots span { width:5px; height:5px; background:var(--text2); border-radius:50%; animation:bounce 1.1s infinite; }
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
.chips { display:flex; flex-wrap:wrap; gap:6px; padding:2px 0 6px 39px; animation:popIn .35s ease both; }
.chip {
  padding:5px 12px; border-radius:20px;
  border:1px solid rgba(124,58,237,0.35);
  background:transparent; color:#C4B5FD;
  font-size:12px; font-family:'Poppins',sans-serif;
  cursor:pointer; transition:all .15s;
}
.chip:hover { background:rgba(124,58,237,0.15); transform:translateY(-1px); }
.input-row {
  padding:11px 13px;
  background:var(--bg3);
  border-top:1px solid var(--border);
  display:flex; gap:8px; align-items:center;
}
.input-row input {
  flex:1; background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px; padding:10px 14px;
  color:var(--text); font-family:'Poppins',sans-serif; font-size:13.5px; outline:none;
  transition:border-color .2s;
}
.input-row input::placeholder { color:var(--text2); }
.input-row input:focus { border-color:var(--purple); }
.send {
  width:40px; height:40px; flex-shrink:0;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  border:none; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s;
}
.send:hover { transform:scale(1.06); box-shadow:0 4px 14px rgba(124,58,237,.5); }
.send svg { width:16px; height:16px; fill:#fff; }
.admin-box {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  animation:fadeUp .5s ease both;
}
.admin-hd {
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.admin-hd h2 { font-family:'Baloo 2',cursive; font-size:15px; }
.exp-btn {
  padding:5px 12px; font-size:12px;
  border:1px solid rgba(124,58,237,0.3);
  border-radius:8px; background:transparent;
  color:#C4B5FD; cursor:pointer;
  font-family:'Poppins',sans-serif; transition:all .18s;
}
.exp-btn:hover { background:rgba(124,58,237,0.15); }
.stat-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  padding:12px 16px;
  border-bottom:1px solid rgba(124,58,237,0.08);
}
.sc { background:var(--bg3); border-radius:10px; padding:10px 12px; }
.sc .sl { font-size:10.5px; color:var(--text2); }
.sc .sv { font-size:20px; font-weight:600; color:var(--text); margin-top:2px; }
.subj-chart { padding:12px 16px; border-bottom:1px solid rgba(124,58,237,0.08); }
.subj-chart h3 { font-size:12px; color:var(--text2); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-label { font-size:12px; color:var(--text); width:70px; flex-shrink:0; }
.bar-track { flex:1; height:6px; background:var(--bg4); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .6s ease; }
.bar-count { font-size:11px; color:var(--text2); width:24px; text-align:right; flex-shrink:0; }
.questions-list { max-height:280px; overflow-y:auto; }
.q-item {
  padding:10px 16px;
  border-bottom:1px solid rgba(124,58,237,0.06);
  display:flex; align-items:center; gap:10px;
}
.q-item:hover { background:rgba(124,58,237,0.04); }
.q-badge { padding:2px 8px; border-radius:12px; font-size:10.5px; font-weight:500; flex-shrink:0; }
.q-text { font-size:12.5px; color:var(--text); flex:1; }
.q-class { font-size:11px; color:var(--text2); flex-shrink:0; }
.q-time { font-size:10.5px; color:var(--text2); flex-shrink:0; }
.empty-admin { text-align:center; padding:2rem; color:var(--text2); font-size:13px; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }
@keyframes popIn    { from{opacity:0;transform:scale(.95)}        to{opacity:1;transform:scale(1)} }
@keyframes bounce   { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎓</div>
  <div class="header-info">
    <h1>Vidya AI Tutor</h1>
    <p>Smart Doubt Solver — Class 1 to 12</p>
  </div>
  <div class="online-badge"><div class="online-dot"></div>24/7 Online</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('chat',this)">💬 Doubt Solver</div>
  <div class="tab" onclick="showTab('admin',this)">📊 Admin Panel</div>
</div>

<div class="subjects">
  <button class="subj math"  onclick="selectSubj(this,'Math')">📐 Math</button>
  <button class="subj phy"   onclick="selectSubj(this,'Physics')">⚡ Physics</button>
  <button class="subj chem"  onclick="selectSubj(this,'Chemistry')">🧪 Chemistry</button>
  <button class="subj bio"   onclick="selectSubj(this,'Biology')">🌿 Biology</button>
  <button class="subj sci"   onclick="selectSubj(this,'Science')">🔬 Science</button>
  <button class="subj eng"   onclick="selectSubj(this,'English')">📖 English</button>
  <button class="subj hindi" onclick="selectSubj(this,'Hindi')">🇮🇳 Hindi</button>
  <button class="subj hist"  onclick="selectSubj(this,'History')">🏛️ History</button>
  <button class="subj geo"   onclick="selectSubj(this,'Geography')">🌍 Geography</button>
  <button class="subj comp"  onclick="selectSubj(this,'Computer')">💻 Computer</button>
</div>

<div class="class-row">
  <span class="class-label">Class:</span>
  <div class="class-pills">
    <button class="cls" onclick="selectClass(this,'1')">1</button>
    <button class="cls" onclick="selectClass(this,'2')">2</button>
    <button class="cls" onclick="selectClass(this,'3')">3</button>
    <button class="cls" onclick="selectClass(this,'4')">4</button>
    <button class="cls" onclick="selectClass(this,'5')">5</button>
    <button class="cls" onclick="selectClass(this,'6')">6</button>
    <button class="cls" onclick="selectClass(this,'7')">7</button>
    <button class="cls" onclick="selectClass(this,'8')">8</button>
    <button class="cls" onclick="selectClass(this,'9')">9</button>
    <button class="cls" onclick="selectClass(this,'10')">10</button>
    <button class="cls" onclick="selectClass(this,'11')">11</button>
    <button class="cls" onclick="selectClass(this,'12')">12</button>
  </div>
</div>

<div class="panel" id="tab-chat">
  <div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Apna doubt yahan likhein..." />
      <button class="send" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="panel" id="tab-admin" style="display:none">
  <div class="admin-box">
    <div class="admin-hd">
      <h2>📊 Admin Dashboard</h2>
      <button class="exp-btn" onclick="exportCSV()">⬇ Export</button>
    </div>
    <div class="stat-grid">
      <div class="sc"><div class="sl">Total Doubts</div><div class="sv" id="st-total">0</div></div>
      <div class="sc"><div class="sl">Today</div><div class="sv" id="st-today">0</div></div>
      <div class="sc"><div class="sl">Top Subject</div><div class="sv" id="st-top" style="font-size:13px;margin-top:4px">—</div></div>
      <div class="sc"><div class="sl">Students</div><div class="sv" id="st-students">0</div></div>
    </div>
    <div class="subj-chart">
      <h3>Subject wise doubts</h3>
      <div id="bars"></div>
    </div>
    <div class="questions-list" id="q-list">
      <div class="empty-admin">Abhi koi doubt nahi — students chat se aayenge 🎓</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 🔑 GEMINI API KEY — APNI KEY YAHAN DAALO
// ═══════════════════════════════════════
const GEMINI_API_KEY = AIzaSyBspShApj7ydMlA7TjshlkPU3QFn75fHT8

// ═══════════════════════════════════════
// SYSTEM PROMPT — SKILL
// ═══════════════════════════════════════
const SYSTEM_PROMPT = `Tu "Vidya" hai — ek expert AI Tutor jo Class 1 se Class 12 tak ke sabhi subjects padha sakta hai.

TERI EXPERTISE:
- Mathematics (Arithmetic, Algebra, Geometry, Trigonometry, Calculus)
- Physics (Mechanics, Optics, Electricity, Thermodynamics, Modern Physics)
- Chemistry (Organic, Inorganic, Physical Chemistry)
- Biology (Botany, Zoology, Human Body, Genetics, Ecology)
- Science (General Science Class 1-8)
- English (Grammar, Literature, Writing, Comprehension)
- Hindi (Vyakaran, Sahitya, Nibandh, Comprehension)
- History (Ancient, Medieval, Modern Indian History, World History)
- Geography (Physical, Human, Indian Geography, Maps)
- Computer Science (Programming basics, MS Office, Internet, Hardware)
- Social Science (Civics, Economics)

PADHANE KA TARIKA:
1. Pehle concept simple language mein samjhao
2. Phir step-by-step solution do
3. Ek real life example do agar ho sake
4. End mein ek tip ya trick batao yaad rakhne ke liye
5. Poochho "Kya aur kuch doubts hain is topic pe?"

IMPORTANT RULES:
- Student ki class ke hisaab se level adjust karo
- Mostly Hindi mein samjhao, technical terms English mein theek hain
- Kabhi bhi "I don't know" mat bolo
- Agar Math/Physics/Chemistry hai toh steps clearly likho
- Encouraging raho — student ki himmat badhao
- CBSE/NCERT curriculum follow karo`;

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let history = [];
let selectedSubject = '';
let selectedClass = '';
let questionLog = [];
let studentSessions = new Set();
let sessionId = Math.random().toString(36).substr(2,9);

const subjColors = {
  Math:'#F59E0B', Physics:'#EF4444', Chemistry:'#7C3AED',
  Biology:'#10B981', Science:'#06B6D4', English:'#3B82F6',
  Hindi:'#EC4899', History:'#F97316', Geography:'#06B6D4', Computer:'#3B82F6'
};

// ═══════════════════════════════════════
// SUBJECT & CLASS
// ═══════════════════════════════════════
function selectSubj(el, name) {
  document.querySelectorAll('.subj').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  selectedSubject = name;
  updatePlaceholder();
}
function selectClass(el, cls) {
  document.querySelectorAll('.cls').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedClass = cls;
  updatePlaceholder();
}
function updatePlaceholder() {
  const inp = document.getElementById('userInput');
  if (selectedSubject && selectedClass)
    inp.placeholder = `Class ${selectedClass} ${selectedSubject} ka doubt likhein...`;
  else if (selectedSubject)
    inp.placeholder = `${selectedSubject} ka doubt likhein...`;
  else
    inp.placeholder = 'Apna doubt yahan likhein...';
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(tab, el) {
  document.getElementById('tab-chat').style.display  = tab==='chat'  ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab==='admin' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab==='admin') renderAdmin();
}

// ═══════════════════════════════════════
// SEND MESSAGE — GEMINI API
// ═══════════════════════════════════════
document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });

async function send(text) {
  const inp = document.getElementById('userInput');
  const msg = text || inp.value.trim();
  if (!msg) return;
  inp.value = '';
  document.querySelectorAll('.chips').forEach(c => c.remove());

  addMsg('user', msg);

  let contextMsg = msg;
  if (selectedSubject || selectedClass) {
    contextMsg = `[Subject: ${selectedSubject||'General'} | Class: ${selectedClass||'Not specified'}]\n\nStudent ka sawaal: ${msg}`;
  }

  history.push({ role:'user', parts:[{ text: contextMsg }] });

  questionLog.unshift({
    q: msg,
    subject: selectedSubject || 'General',
    cls: selectedClass || '—',
    time: new Date().toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'}),
  });
  studentSessions.add(sessionId);

  const typEl = addTyping();

  try {
    // Build contents array with system prompt first
    const contents = [
      { role:'user', parts:[{ text: SYSTEM_PROMPT + '\n\nStudent se baat shuru karo.' }] },
      { role:'model', parts:[{ text: 'Namaste! Main Vidya hun, tumhara AI Tutor. Koi bhi doubt poochho!' }] },
      ...history
    ];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents })
      }
    );

    const data = await res.json();

    if (data.error) {
      typEl.remove();
      addMsg('bot', `⚠️ Error: ${data.error.message}`);
      return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maafi chahta hun, dobara try karein.";
    typEl.remove();
    addMsg('bot', reply);
    history.push({ role:'model', parts:[{ text: reply }] });

    if (history.length <= 4) {
      showChips(['Ek aur example do','Step by step samjhao','Trick batao','Practice question do']);
    }

  } catch(e) {
    typEl.remove();
    addMsg('bot', '⚠️ Network issue. Internet connection check karein aur dobara try karein.');
  }
}

// ═══════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════
function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `
    <div class="av">${role==='bot'?'🎓':'👨‍🎓'}</div>
    <div class="bubble">${formatText(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 9999;
  return el;
}

function formatText(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/```([\s\S]*?)```/g, '<div class="math-block">$1</div>');
  text = text.replace(/`(.*?)`/g, '<code style="background:var(--bg4);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = `<div class="av">🎓</div><div class="dots"><span></span><span></span><span></span></div>`;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 9999;
  return el;
}

function showChips(opts) {
  const el = document.createElement('div');
  el.className = 'chips';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className='chip'; b.textContent=o;
    b.onclick=()=>send(o);
    el.appendChild(b);
  });
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 9999;
}

// ═══════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════
function renderAdmin() {
  document.getElementById('st-total').textContent = questionLog.length;
  document.getElementById('st-today').textContent = questionLog.length;
  document.getElementById('st-students').textContent = studentSessions.size;

  const counts = {};
  questionLog.forEach(q => { counts[q.subject] = (counts[q.subject]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('st-top').textContent = sorted[0]?.[0] || '—';

  const maxCount = sorted[0]?.[1] || 1;
  const barsEl = document.getElementById('bars');
  if (!sorted.length) {
    barsEl.innerHTML = '<div style="color:var(--text2);font-size:12px">Abhi koi data nahi</div>';
  } else {
    barsEl.innerHTML = sorted.slice(0,6).map(([subj,cnt])=>`
      <div class="bar-row">
        <div class="bar-label">${subj}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round((cnt/maxCount)*100)}%;background:${subjColors[subj]||'#7C3AED'}"></div>
        </div>
        <div class="bar-count">${cnt}</div>
      </div>`).join('');
  }

  const qEl = document.getElementById('q-list');
  if (!questionLog.length) {
    qEl.innerHTML = '<div class="empty-admin">Abhi koi doubt nahi — students chat se aayenge 🎓</div>';
  } else {
    qEl.innerHTML = questionLog.slice(0,50).map(q=>`
      <div class="q-item">
        <span class="q-badge" style="background:${subjColors[q.subject]||'#7C3AED'}22;color:${subjColors[q.subject]||'#C4B5FD'}">${q.subject}</span>
        <div class="q-text">${q.q.substring(0,60)}${q.q.length>60?'...':''}</div>
        <div class="q-class">Cl.${q.cls}</div>
        <div class="q-time">${q.time}</div>
      </div>`).join('');
  }
}

function exportCSV() {
  if(!questionLog.length){alert('Abhi koi data nahi!');return;}
  const rows=[['Question','Subject','Class','Time'],
    ...questionLog.map(q=>[`"${q.q.replace(/"/g,"'")}"`,q.subject,q.cls,q.time])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='vidya_tutor_doubts.csv';
  a.click();
}
